<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Rocky Solutions LLC</title>
    <script>
      // GitHub Pages SPA fallback: encode the requested path into a query
      // string and bounce to index.html, which decodes it back.
      var pathSegmentsToKeep = 1; // keep /hvac-crm/
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") +
          "/?/" +
          l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
